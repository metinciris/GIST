<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GİST Raporlama</title>
  <meta name="description" content="GİST biyopsi ve rezeksiyon için statik React rapor oluşturucu" />
  <style>
    :root{
      --bg:#f4f7fb;--card:#fff;--ink:#152033;--muted:#64748b;--line:#d9e2ef;--blue:#1f6feb;--blue2:#e8f1ff;--green:#dcfce7;--greenLine:#22c55e;--warn:#fff7ed;--shadow:0 16px 44px rgba(15,23,42,.08);--radius:18px
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#e8f1ff 0,transparent 36rem),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
    header,main,.foot{max-width:1480px;margin:auto;padding:18px 20px} .hero{background:linear-gradient(135deg,#0f172a,#1f6feb);color:white;border-radius:26px;padding:26px;box-shadow:var(--shadow)}
    h1{margin:0 0 6px;font-size:clamp(26px,4vw,42px);letter-spacing:-.03em}.hero p{margin:0;color:#dbeafe;max-width:980px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .tab,.choice,.action{border:1px solid var(--line);border-radius:999px;padding:9px 13px;font-weight:800;cursor:pointer;background:white;color:var(--ink)}.tab{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35);color:white}.tab.active{background:white;color:#0f172a}.choice.selected{background:var(--blue2);border-color:var(--blue);color:#0f4fb6}.choice.selected.entered{background:var(--green);border-color:var(--greenLine);color:#166534}.action.primary{background:var(--blue);border-color:var(--blue);color:white}.action.warn{background:var(--warn);color:#9a3412;border-color:#fed7aa}
    main{display:grid;grid-template-columns:minmax(360px,1fr) minmax(420px,.9fr);gap:18px;align-items:start}@media(max-width:980px){main{grid-template-columns:1fr}.report{position:static!important}}
    .stack{display:grid;gap:14px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card h2,.card h3{margin:0;padding:15px 18px;border-bottom:1px solid var(--line);font-size:18px}.card h3{font-size:15px;background:#f8fafc}.section{padding:15px 18px;display:grid;gap:13px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}
    label{display:grid;gap:6px;font-size:13px;font-weight:800;color:#334155} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:white;color:var(--ink);font:inherit;outline:none}textarea{min-height:80px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,111,235,.12)}.filled input,.filled select,.filled textarea{background:var(--green);border-color:var(--greenLine)}
    .buttonrow{display:flex;gap:8px;flex-wrap:wrap}.note{margin:0;color:var(--muted);font-size:12px}.summary{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 16px}.pill{display:inline-flex;padding:7px 10px;border:1px solid #99f6e4;border-radius:999px;background:#e7f8f5;color:#0f766e;font-size:12px;font-weight:900}.pill.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.report{position:sticky;top:14px}.actions{display:flex;gap:8px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line);background:#f8fafc}
    .reportbox{white-space:pre-wrap;font-family:"Courier New",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;line-height:1.55;background:#0b1220;color:#e2e8f0;padding:18px;min-height:620px;overflow:auto}.previewtitle{color:#93c5fd;font-weight:900}.foot{color:var(--muted);font-size:12px;padding-top:0}.mini{font-size:12px;color:#64748b}.danger{color:#b91c1c;font-weight:900}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const {useMemo,useState}=React;
    const siteLabels={gastric:"Mide",duodenum:"Duodenum",jejunumIleum:"Jejunum/İleum",rectum:"Rektum",other:"Diğer"};
    const riskTable={
      gastric:{low:[[2,"Yok (%0)"],[5,"Çok düşük (%1,9)"],[10,"Düşük (%3,6)"],[Infinity,"Orta (%12)"]],high:[[2,"Yok"],[5,"Orta (%16)"],[10,"Yüksek (%55)"],[Infinity,"Yüksek (%86)"]]},
      duodenum:{low:[[2,"Yok (%0)"],[5,"Düşük (%8,3)"],[10,"Yetersiz veri"],[Infinity,"Yüksek (%34)"]],high:[[2,"Yetersiz veri"],[5,"Yüksek (%50)"],[10,"Yetersiz veri"],[Infinity,"Yüksek (%86)"]]},
      jejunumIleum:{low:[[2,"Yok (%0)"],[5,"Düşük (%4,3)"],[10,"Orta (%24)"],[Infinity,"Yüksek (%52)"]],high:[[2,"Yüksek"],[5,"Yüksek (%73)"],[10,"Yüksek (%85)"],[Infinity,"Yüksek (%90)"]]},
      rectum:{low:[[2,"Yok (%0)"],[5,"Düşük (%8,5)"],[10,"Yetersiz veri"],[Infinity,"Yüksek (%57)"]],high:[[2,"Yüksek (%54)"],[5,"Yüksek (%52)"],[10,"Yetersiz veri"],[Infinity,"Yüksek (%71)"]]}
    };
    const blank={mode:"resection",histology:"",size1:"",size2:"",size3:"",border:"",focality:"",site:"",siteDetail:"",mitotic:"",necrosis:"",treatmentEffect:"",margins:"",marginExtra:"",nodes:"",gradeOverride:"",riskOverride:"",ptOverride:"",procedure:"",biopsyProcedure:"",kit:"",dog1:"",sdha:"",sdhb:"",braf:"",cd34:"",sma:"",s100:"",ki67:"",diagnosisPrefix:"",comment:""};
    function num(v){const x=parseFloat(String(v).replace(",","."));return Number.isFinite(x)?x:null}
    function maxSize(s){const vals=[num(s.size1),num(s.size2),num(s.size3)].filter(v=>v!==null);return vals.length?Math.max(...vals):null}
    function fmtNum(v){return String(v??"").replace(".",",")}
    function fmtCm(v){return v===null||v===""?"":`${fmtNum(v)} cm`}
    function dims(s){const vals=[s.size1,s.size2,s.size3].map(v=>String(v||"").trim()).filter(Boolean).map(fmtNum); return vals.length?`${vals.join(" x ")} cm`:""}
    function grade(s){if(s.gradeOverride)return s.gradeOverride; const m=num(s.mitotic); if(m===null)return ""; return m<=5?"G1; low grade":"G2; high grade"}
    function risk(s){
      if(s.riskOverride)return s.riskOverride;
      const size=maxSize(s),m=num(s.mitotic);
      if(size===null||m===null||!s.site)return "";
      const key=s.site==="other"?"jejunumIleum":s.site;
      const mitosisBand=m<=5?"low":"high";
      const direct=(riskTable[key][mitosisBand].find(([lim])=>size<=lim)?.[1]||"");
      if(direct!=="Yetersiz veri") return direct;
      const fallback=(riskTable.jejunumIleum[mitosisBand].find(([lim])=>size<=lim)?.[1]||"");
      return fallback ? `CAP risk verisi bulunmuyor; Jejunum/İleum kriterine göre ${fallback}` : "CAP risk verisi bulunmuyor";
    }
    function pt(s){if(s.ptOverride)return s.ptOverride; const size=maxSize(s); if(size===null)return ""; if(size===0)return "pT0"; if(size<=2)return "pT1"; if(size<=5)return "pT2"; if(size<=10)return "pT3"; return "pT4"}
    function mitoticLine(s){return s.mitotic?`${fmtNum(s.mitotic)} mitoz/5mm2`:""}
    function reportLines(s){
      const rows=[]; const add=(a,b)=>{if(String(b??"").trim())rows.push([a,b])};
      if(s.diagnosisPrefix) rows.push(["Tanı",s.diagnosisPrefix]);
      if(s.mode==="biopsy") add("Materyal",s.biopsyProcedure);
      if(s.mode==="resection" && s.procedure) add("Materyal",s.procedure);
      add("Histolojik Tip",s.histology);
      add("En büyük tümör boyutu",fmtCm(maxSize(s)));
      add("Tümör boyutları",dims(s));
      if(s.mode==="resection") add("Tümör sınırları",s.border);
      if(s.mode==="resection") add("Tümör odağı",s.focality);
      add("Tümör yerleşimi",(siteLabels[s.site]||"")+(s.siteDetail?`${s.site?", ":""}${s.siteDetail}`:""));
      add("Mitotik oran",mitoticLine(s));
      add("Nekroz",s.necrosis);
      add("Tedavi etkisi",s.treatmentEffect);
      if(s.mode==="resection") add("Cerrahi sınırlar",[s.margins,s.marginExtra].filter(Boolean).join(", "));
      if(s.mode==="resection") add("Bölgesel lenf nodları durumu",s.nodes);
      add("Histolojik Grade",grade(s));
      add("Risk değerlendirmesi",risk(s));
      if(s.mode==="resection") add("pT kategori",pt(s));
      rows.push(["",""]);
      add("C-KİT(CD117)",s.kit); add("DOG1 (ANO1)",s.dog1); add("SDHA",s.sdha); add("SDHB",s.sdhb); add("BRAF",s.braf); add("CD 34",s.cd34); add("SMA",s.sma); add("S-100",s.s100); add("Ki-67",s.ki67?s.ki67.includes("%")?s.ki67:`${s.ki67}%`:"");
      if(s.comment){rows.push(["",""]); add("Yorum",s.comment)}
      return rows.map(([a,b])=>a?`${a}: \t${b}`:"").join("\n").trim();
    }
    function cls(v){return String(v??"").trim()?"filled":""}
    function Field({label,value,children}){return <label className={cls(value)}><span>{label}</span>{children}</label>}
    function Choices({items,value,setValue}){return <div className="buttonrow">{items.map(x=><button key={x} type="button" className={`choice ${value===x?"selected entered":""}`} onClick={()=>setValue(x)}>{x}</button>)}</div>}
    function Section({title,children}){return <div className="card"><h3>{title}</h3><div className="section">{children}</div></div>}
    function App(){const [s,setS]=useState(blank); const set=(k,v)=>setS(p=>({...p,[k]:v})); const rep=useMemo(()=>reportLines(s),[s]); const copy=async()=>{await navigator.clipboard.writeText(rep); alert("Rapor panoya kopyalandı")}; const reset=()=>confirm("Tüm alanlar temizlensin mi?")&&setS(blank); const switchMode=m=>setS({...blank,mode:m});
      return <>
        <header><div className="hero"><h1>GİST Raporlama</h1><p>Rezeksiyon ve biyopsi için ayrı giriş ekranı. Açıklama kalabalığı kaldırıldı; çıktı, doğrudan patoloji raporuna yapıştırılabilecek kısa satır formatında oluşur.</p><div className="tabs"><button className={`tab ${s.mode==="resection"?"active":""}`} onClick={()=>switchMode("resection")}>Rezeksiyon</button><button className={`tab ${s.mode==="biopsy"?"active":""}`} onClick={()=>switchMode("biopsy")}>Biyopsi</button></div></div></header>
        <main><div className="stack">
          <div className="card"><h2>Otomatik hesap</h2><div className="summary"><span className="pill">Grade: {grade(s)||"-"}</span><span className={risk(s)==="Yetersiz veri"?"pill warn":"pill"}>Risk: {risk(s)||"-"}</span>{s.mode==="resection"&&<span className="pill">pT: {pt(s)||"-"}</span>}</div></div>
          <Section title="Materyal ve tanı">
            {s.mode==="resection"?<><p className="note">Rezeksiyon materyali</p><Choices items={["Lokal eksizyon","Parsiyel gastrektomi","Subtotal gastrektomi","Total gastrektomi","Segmenter barsak rezeksiyonu","Diğer"]} value={s.procedure} setValue={v=>set("procedure",v)} /></>:<><p className="note">Biyopsi materyali</p><Choices items={["Endoskopik biyopsi","Core needle biyopsi","İnce iğne aspirasyon biyopsisi","Diğer"]} value={s.biopsyProcedure} setValue={v=>set("biopsyProcedure",v)} /></>}
            <Field label="Tanı satırı / ek başlık" value={s.diagnosisPrefix}><input value={s.diagnosisPrefix} onChange={e=>set("diagnosisPrefix",e.target.value)} placeholder="İsteğe bağlı" /></Field>
            <div><p className="note">Histolojik tip</p><Choices items={["Gastrointestinal Stromal Tümör, iğsi hücreli","Gastrointestinal Stromal Tümör, epiteloid","Gastrointestinal Stromal Tümör, mikst","Gastrointestinal Stromal Tümör"]} value={s.histology} setValue={v=>set("histology",v)} /></div>
          </Section>
          <Section title="Tümör bilgileri">
            <div className="grid3"><Field label="Boyut 1 cm" value={s.size1}><input type="number" step="0.1" value={s.size1} onChange={e=>set("size1",e.target.value)} placeholder="Örn. 4" /></Field><Field label="Boyut 2 cm" value={s.size2}><input type="number" step="0.1" value={s.size2} onChange={e=>set("size2",e.target.value)} placeholder="İsteğe bağlı" /></Field><Field label="Boyut 3 cm" value={s.size3}><input type="number" step="0.1" value={s.size3} onChange={e=>set("size3",e.target.value)} placeholder="İsteğe bağlı" /></Field></div><p className="note">Üç boyut istenir; bir veya iki boyut girilirse yalnızca girilen boyutlar rapora yazılır. En büyük tümör boyutu otomatik hesaplanır.</p>
            {s.mode==="resection"&&<><p className="note">Tümör sınırları</p><Choices items={["İnfiltratif","İyi sınırlı","Ekspansil","Belirlenemedi"]} value={s.border} setValue={v=>set("border",v)} /><p className="note">Tümör odağı</p><Choices items={["Unifokal","Multifokal","Belirlenemedi"]} value={s.focality} setValue={v=>set("focality",v)} /></>}
            <p className="note">Tümör yerleşimi</p><div className="buttonrow">{Object.entries(siteLabels).map(([k,v])=><button key={k} type="button" className={`choice ${s.site===k?"selected entered":""}`} onClick={()=>set("site",k)}>{v}</button>)}</div>
            <Field label="Yerleşim detayı" value={s.siteDetail}><input value={s.siteDetail} onChange={e=>set("siteDetail",e.target.value)} placeholder="Örn. antrum, korpus, rektum anterior duvar" /></Field>
            <div className="grid2"><Field label="Mitotik oran / 5 mm²" value={s.mitotic}><input type="number" step="1" value={s.mitotic} onChange={e=>set("mitotic",e.target.value)} /></Field><Field label="Ki-67 (%)" value={s.ki67}><input value={s.ki67} onChange={e=>set("ki67",e.target.value)} /></Field></div>
            <p className="note">Nekroz</p><Choices items={["Yok","Var","Belirlenemedi"]} value={s.necrosis} setValue={v=>set("necrosis",v)} />
            <p className="note">Tedavi etkisi</p><Choices items={[s.mode==="biopsy"?"Bilinen biyopsi öncesi tedavi yok":"Bilinen cerrahi öncesi tedavi yok","Tedavi etkisi yok","Tedavi etkisi var","Belirlenemedi"]} value={s.treatmentEffect} setValue={v=>set("treatmentEffect",v)} />
          </Section>
          {s.mode==="resection"&&<Section title="Cerrahi sınır, lenf nodu ve evre">
            <p className="note">Cerrahi sınırlar</p><Choices items={["Cerrahi sınırlarda tümör yoktur","Cerrahi sınırda tümör vardır","Belirlenemedi","Uygulanamaz"]} value={s.margins} setValue={v=>set("margins",v)} />
            <Field label="Cerrahi sınır ek cümlesi" value={s.marginExtra}><input value={s.marginExtra} onChange={e=>set("marginExtra",e.target.value)} placeholder="Örn. Serozal yüzeye 0,1 cm'den yakındır" /></Field>
            <p className="note">Bölgesel lenf nodları durumu</p><Choices items={["Bölgesel lenf nodu yoktur","Bölgesel lenf nodlarında tümör yoktur","Bölgesel lenf nodunda tümör vardır","Belirlenemedi"]} value={s.nodes} setValue={v=>set("nodes",v)} />
            <div className="grid2"><Field label="Risk manuel düzeltme" value={s.riskOverride}><input value={s.riskOverride} onChange={e=>set("riskOverride",e.target.value)} placeholder="Boş bırakılırsa otomatik" /></Field><Field label="pT manuel düzeltme" value={s.ptOverride}><input value={s.ptOverride} onChange={e=>set("ptOverride",e.target.value)} placeholder="Boş bırakılırsa otomatik" /></Field></div>
          </Section>}
          <Section title="İmmünohistokimya">
            <div className="grid2">
              {[["kit","C-KİT(CD117)"],["dog1","DOG1 (ANO1)"],["sdha","SDHA"],["sdhb","SDHB"],["braf","BRAF"],["cd34","CD 34"],["sma","SMA"],["s100","S-100"]].map(([k,l])=><Field key={k} label={l} value={s[k]}><input value={s[k]} onChange={e=>set(k,e.target.value)} /></Field>)}
            </div>
          </Section>
          <Section title="Yorum"><Field label="Yorum" value={s.comment}><textarea value={s.comment} onChange={e=>set("comment",e.target.value)} /></Field><p className="mini"><span className="danger">Kontrol:</span> 4 cm + 3 mitoz + mide seçilirse CAP risk tablosuna göre otomatik sonuç “Çok düşük (%1,9)” olur. “Orta (%12)” yalnızca mide, ≤5 mitoz ve &gt;10 cm grubunda üretilir.</p></Section>
        </div>
        <aside className="card report"><h2>Rapor çıktısı</h2><div className="actions"><button type="button" className="action primary" onClick={copy}>Raporu kopyala</button><button type="button" className="action" onClick={()=>window.print()}>Yazdır</button><button type="button" className="action warn" onClick={reset}>Temizle</button></div><div className="reportbox"><span className="previewtitle">{s.mode==="resection"?"Rezeksiyon kısa raporu":"Biyopsi kısa raporu"}</span>{"\n\n"}{rep}</div></aside></main>
        <div className="foot">Not: Otomatik risk/grade/pT hesapları yardımcı amaçlıdır; nihai rapor patoloğun kontrolüyle verilmelidir.</div>
      </>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
